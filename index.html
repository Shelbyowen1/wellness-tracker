<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wellness">
<title>Wellness Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F2ED;--card:#fff;--text:#1A1A18;--muted:#7A7870;--border:#E5E1DA;
  --teal:#1D9E75;--teal-l:#E1F5EE;--coral:#D85A30;--coral-l:#FAECE7;
  --amber:#BA7517;--amber-l:#FAEEDA;--blue:#185FA5;--blue-l:#E6F1FB;
  --purple:#534AB7;--purple-l:#EEEDFE;--pink:#D4537E;
  --safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,20px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}
.header{position:sticky;top:0;z-index:50;background:rgba(245,242,237,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:calc(var(--safe-top) + 8px) 20px 12px;border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.h-title{font-family:'DM Serif Display',serif;font-size:27px;line-height:1.1}
.h-date{font-size:12px;color:var(--muted);margin-top:2px}
.w-badge{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;margin-top:4px;white-space:nowrap}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 5px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;transition:color .15s}
.nav-btn.active{color:var(--teal)}
.nav-icon{font-size:20px;line-height:1}
.page{display:none;padding:0 14px calc(88px + var(--safe-bottom))}
.page.active{display:block}

/* WEEK SECTIONS */
.week-section{margin-bottom:4px}
.week-section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:14px 2px 6px;display:flex;align-items:center;gap:8px}
.week-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.day-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.day-row::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:13px;border:1px solid var(--border);background:white;cursor:pointer;white-space:nowrap;color:var(--muted);transition:all .15s}
.day-pill.active{background:var(--teal);color:white;border-color:var(--teal);font-weight:500}
.day-pill.past{opacity:.55}

.sec-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 0 6px 2px}
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.check-item{display:flex;align-items:flex-start;gap:11px;padding:12px 15px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-user-select:none;transition:background .1s}
.check-item:last-child{border-bottom:none}
.check-item:active{background:var(--bg)}
.check-item.done .c-label{opacity:.35;text-decoration:line-through}
.check-item.done .c-time,.check-item.done .c-note{opacity:.35}
.cbox{width:23px;height:23px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:white}
.check-item.done .cbox{background:var(--teal);border-color:var(--teal)}
.ctick{color:white;font-size:12px;opacity:0;transition:opacity .15s}
.check-item.done .ctick{opacity:1}
.c-content{flex:1;min-width:0}
.c-time{font-size:11px;color:var(--muted);margin-bottom:1px}
.c-label{font-size:15px;font-weight:500;line-height:1.3}
.c-note{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45;font-weight:300}

/* PROGRESS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.s-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.s-val{font-size:30px;font-weight:300;font-family:'DM Serif Display',serif}
.s-sub{font-size:11px;color:var(--muted);margin-top:2px}
.bar-row{margin-bottom:11px}
.bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.bar-track{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--teal);transition:width .5s}
.wday-strip{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.wday-strip::-webkit-scrollbar{display:none}
.wday-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 6px;background:var(--card);border:1px solid var(--border);border-radius:10px;min-width:36px}
.wday-chip.done{border-color:var(--teal);background:var(--teal-l)}
.wdc-l{font-size:9px;color:var(--muted);font-weight:500;text-transform:uppercase}
.wday-chip.done .wdc-l{color:var(--teal)}
.wdc-p{font-size:11px;font-weight:500}
.wday-chip.done .wdc-p{color:var(--teal)}
textarea{width:100%;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:var(--text);background:transparent;resize:none;min-height:90px;line-height:1.6}

/* PORTIONS */
.ptabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding-top:14px}
.ptab{padding:7px 15px;border-radius:20px;border:1px solid var(--border);background:white;font-size:13px;cursor:pointer;color:var(--muted);transition:all .15s}
.ptab.active{background:var(--coral-l);color:var(--coral);border-color:var(--coral);font-weight:500}
.pseg{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:9px}
.ps-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.ps-amt{font-size:22px;font-weight:300;font-family:'DM Serif Display',serif}
.ps-unit{font-size:13px;color:var(--muted);margin-top:1px}
.ps-note{font-size:12px;color:var(--muted);margin-top:7px;padding-top:7px;border-top:1px solid var(--border);line-height:1.5;font-weight:300}
.tip-box{background:var(--blue-l);border:1px solid #B5D4F4;border-radius:14px;padding:12px 14px;font-size:13px;color:var(--blue);line-height:1.5;margin-top:4px}

/* GYM */
.gym-day-tabs{display:flex;gap:6px;padding:14px 0 10px;overflow-x:auto;scrollbar-width:none}
.gym-day-tabs::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:white;font-size:13px;cursor:pointer;color:var(--muted);transition:all .15s}
.gtab.active{background:var(--purple-l);color:var(--purple);border-color:var(--purple);font-weight:500}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden}
.ex-header{padding:13px 15px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.ex-num{width:28px;height:28px;border-radius:50%;background:var(--purple-l);color:var(--purple);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-name{font-size:15px;font-weight:500;flex:1}
.ex-muscle{font-size:11px;color:var(--muted)}
.set-row{display:flex;align-items:center;padding:10px 15px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;-webkit-user-select:none;transition:background .1s}
.set-row:last-child{border-bottom:none}
.set-row:active{background:var(--bg)}
.set-row.done-set .set-label{opacity:.4;text-decoration:line-through}
.set-row.done-set .set-detail{opacity:.4}
.set-cbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:white;transition:all .2s}
.set-row.done-set .set-cbox{background:var(--purple);border-color:var(--purple)}
.set-tick{color:white;font-size:11px;opacity:0;transition:opacity .15s}
.set-row.done-set .set-tick{opacity:1}
.set-label{font-size:14px;font-weight:500;flex:1}
.set-detail{font-size:12px;color:var(--muted)}
.set-warmup .set-label{color:var(--amber)}
.set-warmup.done-set .set-label{color:var(--muted)}
.gym-note{font-size:12px;color:var(--muted);padding:10px 15px;border-top:1px solid var(--border);line-height:1.5;font-weight:300}
.rest-day-msg{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;margin-top:8px}
.rest-icon{font-size:36px;margin-bottom:8px}
.rest-msg{font-size:15px;font-weight:500;margin-bottom:4px}
.rest-sub{font-size:13px;color:var(--muted)}
.reset-btn{width:100%;padding:13px;background:none;border:1px solid var(--border);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;margin-top:4px}
.reset-btn:active{background:var(--border)}
.prog-week-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.prog-week-lbl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;min-width:52px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div><div class="h-title" id="hTitle">Today</div><div class="h-date" id="hDate"></div></div>
    <div class="w-badge" id="hBadge">Week 1</div>
  </div>
</div>

<!-- TODAY -->
<div class="page active" id="page-today">
  <div id="weekSections"></div>
  <div id="checklistWrap"></div>
  <button class="reset-btn" onclick="resetDay()">Reset this day's checklist</button>
</div>

<!-- PROGRESS -->
<div class="page" id="page-progress">
  <div class="sec-label" style="padding-top:14px">All 28 days</div>
  <div class="wday-strip" id="wdayStrip"></div>
  <div class="stat-grid">
    <div class="stat-card"><div class="s-label">Days active</div><div class="s-val" id="sDays">0</div><div class="s-sub">of 28 days</div></div>
    <div class="stat-card"><div class="s-label">Today</div><div class="s-val" id="sToday">0%</div><div class="s-sub" id="sTodaySub">0 items</div></div>
  </div>
  <div class="card" style="padding:15px;margin-bottom:10px">
    <div class="bar-top"><span style="font-weight:500">28-day overall</span><span id="overallPct" style="color:var(--muted)">0%</span></div>
    <div class="bar-track" style="height:9px;border-radius:5px"><div class="bar-fill" id="overallBar" style="height:100%;border-radius:5px;width:0%"></div></div>
  </div>
  <div class="sec-label">By week</div>
  <div class="card" style="padding:15px;margin-bottom:10px"><div id="weekBars"></div></div>
  <div class="sec-label">Key habits</div>
  <div class="card" style="padding:15px;margin-bottom:10px"><div id="habitBars"></div></div>
  <div class="sec-label">Notes</div>
  <div class="card" style="padding:13px 15px"><textarea id="notesArea" placeholder="How are you feeling? Bloating changes? Energy? Weight?" oninput="saveNotes()"></textarea></div>
</div>

<!-- PORTIONS -->
<div class="page" id="page-portions">
  <div class="ptabs">
    <div class="ptab active" onclick="showPortion('shake',this)">Shake</div>
    <div class="ptab" onclick="showPortion('lunch',this)">Lunch</div>
    <div class="ptab" onclick="showPortion('dinner',this)">Dinner</div>
    <div class="ptab" onclick="showPortion('snack',this)">Snacks</div>
  </div>
  <div id="portionContent"></div>
</div>

<!-- GYM -->
<div class="page" id="page-gym">
  <div class="gym-day-tabs">
    <div class="gtab active" onclick="showGymDay('mon',this)">Monday</div>
    <div class="gtab" onclick="showGymDay('wed',this)">Wednesday</div>
    <div class="gtab" onclick="showGymDay('fri',this)">Friday</div>
  </div>
  <div id="gymContent"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="goPage('today',this)"><span class="nav-icon">☀️</span>Today</button>
  <button class="nav-btn" onclick="goPage('progress',this)"><span class="nav-icon">📈</span>Progress</button>
  <button class="nav-btn" onclick="goPage('portions',this)"><span class="nav-icon">🥗</span>Portions</button>
  <button class="nav-btn" onclick="goPage('gym',this)"><span class="nav-icon">🏋️</span>Gym</button>
</nav>

<script>
// ── CONSTANTS ─────────────────────────────────────────
const DAY3=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WKLABELS=['Week 1 — Reset','Week 2 — Build','Week 3 — Maintain','Week 4 — Habit lock'];
const WKSHORT=['W1','W2','W3','W4'];
const WKCOLORS=[
  {bg:'var(--teal-l)',color:'var(--teal)'},
  {bg:'var(--blue-l)',color:'var(--blue)'},
  {bg:'var(--purple-l)',color:'var(--purple)'},
  {bg:'var(--coral-l)',color:'var(--coral)'},
];

const START=(()=>{
  const s=localStorage.getItem('wt_start');
  if(s) return new Date(s);
  const d=new Date();d.setHours(0,0,0,0);
  localStorage.setItem('wt_start',d.toISOString());
  return d;
})();

let selDay=0,curPage='today';

function todayOff(){
  const n=new Date();n.setHours(0,0,0,0);
  return Math.max(0,Math.min(27,Math.round((n-START)/86400000)));
}
function dayType(off){ // 0=Mon offset within week
  const i=off%7;
  if(i===0||i===2||i===4) return 'weights';
  if(i===1||i===3) return 'cardio';
  return 'rest';
}
function weekNum(off){ return Math.floor(off/7); } // 0-indexed

// ── SCHEDULE ─────────────────────────────────────────
function makeSchedule(off){
  const type=dayType(off),wk=weekNum(off),w1=wk===0,w2=wk===1;
  const isMaint=wk>=2;

  if(type==='rest') return [
    {id:'wake',  time:'7:00 am',dot:'#888780',label:'Sleep in / gentle wake',    note:'Rest days are recovery. Let your body repair and muscles grow.'},
    {id:'shake', time:'7:30 am',dot:'#1D9E75',label:'Morning shake',              note:'Same formula every day — consistency is the whole game.'},
    {id:'coffee1',time:'8:00 am',dot:'#BA7517',label:'Coffee — slow morning',    note:'One cup, after food. Enjoy it without rushing.'},
    {id:'dog',   time:'10:00 am',dot:'#D4537E',label:'Dog park / leisure walk',  note:'Light movement keeps digestion moving on rest days.'},
    {id:'lunch', time:'12:30 pm',dot:'#1D9E75',label:'Lunch',                    note: isMaint?'Habits are locking in. Keep the structure even on weekends.':'Keep it clean. Weekends are when temptations hit — plan ahead.'},
    {id:'snack', time:'3:30 pm',dot:'#BA7517',label:'Snack (only if hungry)',    note:'Hard-boiled egg or hummus + cucumber. Skip if not hungry.'},
    {id:'dinner',time:'6:30 pm',dot:'#1D9E75',label:'Dinner',                   note:'Clean protein + cooked veg. Same structure as weekdays.'},
    {id:'supps', time:'7:00 pm',dot:'#D85A30',label:'D3/K2 supplement',         note:'With dinner — fat-soluble, always needs food.'},
    {id:'close', time:'8:00 pm',dot:'#888780',label:'Kitchen closed',            note:'Overnight fast begins. Herbal tea is fine.'},
    {id:'sleep', time:'9:30 pm',dot:'#888780',label:'Wind down',                 note:'Rest day — no 5 am alarm. But try to keep sleep time consistent.'},
  ];

  const base=[
    {id:'wake',   time:'5:00 am',dot:'#534AB7',label:'Wake up + head to gym',     note:'Drink 12–16 oz water before leaving.'},
    {id:'cardio', time:'5:15 am',dot:'#534AB7',label:'Treadmill — 60 min',        note:type==='weights'?'Cardio first, conserve a little for machines after.':'Full 60 min. Try intervals or incline today.'},
  ];
  if(type==='weights') base.push(
    {id:'weights',time:'6:15 am',dot:'#185FA5',label:'Weight training — 20–25 min',note:isMaint?'Maintenance mode: keep intensity up, this is habit now. Try nudging weight up.':w2?'Increase weight slightly from last week. Same movements.':'3 exercises, 3 warm-up sets + 3 working sets each. Check the Gym tab.'}
  );
  base.push(
    {id:'shake',  time:type==='weights'?'6:45 am':'6:25 am',dot:'#1D9E75',label:'Post-gym shake',    note:'½ banana + ½ cup berries + 1 scoop Orgain + spinach. Within 45 min of finishing.'},
    {id:'coffee1',time:type==='weights'?'6:55 am':'6:35 am',dot:'#BA7517',label:'First coffee',       note:'After your shake — not before. Caffeine on an empty stomach aggravates bloating.'}
  );
  if(type==='weights') base.push(
    {id:'dog',time:'7:30 am',dot:'#D4537E',label:'Dog park',note:'Bonus steps + mental reset before work. You earned it.'}
  );
  base.push(
    {id:'work',  time:type==='weights'?'8:45 am':'7:30 am',dot:'#888780',label:'Work starts',         note:'Shake carries you comfortably to lunch. No snack pressure.'},
    {id:'snack', time:'10:00 am',dot:'#185FA5',label:'Mid-morning snack (if hungry)', note:isMaint?'By now you should be reading hunger cues well. Trust them.':'Nut butter on rice cake, or walnuts. Skip if not hungry.'},
    {id:'lunch', time:'12:30 pm',dot:'#1D9E75',label:'Lunch',                          note:isMaint?'This is your routine now. Keep it satisfying and consistent.':w2?'Whole Detox leftovers. Satisfying portions, not tiny.':'Whole Detox leftovers — cooked veg only this week.'},
    {id:'coffee2',time:'1:00 pm',dot:'#BA7517',label:'Last coffee of the day',          note:'Coffee cutoff. Herbal or peppermint tea after this.'},
    {id:'snack2',time:'3:30 pm',dot:'#185FA5',label:'Afternoon snack (optional)',       note:type==='weights'?'Small protein snack helps recovery on weights days.':'Skip if not hungry — a good sign your meals are dialed in.'},
    {id:'dinner',time:'6:30 pm',dot:'#1D9E75',label:'Dinner',                           note:isMaint?'Whole Detox base. Add new recipes to keep it interesting.':w2?'Add variety gradually. Introduce one new food at a time.':'Clean protein + cooked veg + optional squash or lentils.'},
    {id:'supps', time:'7:00 pm',dot:'#D85A30',label:'D3/K2 supplement',                note:isMaint?'Daily non-negotiable. Takes 2 seconds.':w2?'Can reintroduce ONE gummy — beet OR fiber, not both.':'Fiber + beet gummies PAUSED. D3/K2 only this week.'},
    {id:'close', time:'8:00 pm',dot:'#888780',label:'Kitchen closed',                   note:'11–12 hr overnight fast. Biggest bloat reducer in this plan.'},
    {id:'sleep', time:'9:00 pm',dot:'#888780',label:'Wind down',                        note:'5 am alarm needs 7–8 hrs. In bed by 9–9:30 pm.'}
  );
  return base;
}

// ── STORAGE ──────────────────────────────────────────
function loadChecked(off){try{return JSON.parse(localStorage.getItem('wt_d'+off)||'[]')}catch{return[]}}
function saveChecked(off,arr){localStorage.setItem('wt_d'+off,JSON.stringify(arr))}
function loadGymChecked(day){try{return JSON.parse(localStorage.getItem('wt_g_'+day)||'[]')}catch{return[]}}
function saveGymChecked(day,arr){localStorage.setItem('wt_g_'+day,JSON.stringify(arr))}
function saveNotes(){localStorage.setItem('wt_notes',document.getElementById('notesArea').value)}

// ── HEADER ───────────────────────────────────────────
function updateHeader(){
  const today=new Date();
  document.getElementById('hTitle').textContent='Today';
  document.getElementById('hDate').textContent=today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const wk=weekNum(todayOff());
  const c=WKCOLORS[wk];
  const badge=document.getElementById('hBadge');
  badge.textContent=WKSHORT[wk]+' · '+['Reset','Build','Maintain','Lock'][wk];
  badge.style.background=c.bg;badge.style.color=c.color;
}

// ── WEEK SECTIONS + DAY PILLS ────────────────────────
function buildWeekSections(){
  const container=document.getElementById('weekSections');
  container.innerHTML='';
  const today=todayOff();
  for(let w=0;w<4;w++){
    const sec=document.createElement('div');sec.className='week-section';
    const lbl=document.createElement('div');lbl.className='week-section-label';
    lbl.innerHTML=`<span style="color:${WKCOLORS[w].color};font-size:11px">${WKLABELS[w]}</span>`;
    sec.appendChild(lbl);
    const row=document.createElement('div');row.className='day-row';
    for(let d=0;d<7;d++){
      const off=w*7+d;
      const date=new Date(START);date.setDate(date.getDate()+off);
      const t=dayType(off);
      const icon=t==='weights'?'🏋️':t==='cardio'?'🏃':'😴';
      const lname=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][d];
      const pill=document.createElement('div');
      pill.className='day-pill'+(off===selDay?' active':'')+(off<today?' past':'');
      pill.textContent=icon+' '+lname;
      pill.onclick=(()=>{const o=off;return()=>selectDay(o);})();
      row.appendChild(pill);
    }
    sec.appendChild(row);
    container.appendChild(sec);
  }
  // scroll selected into view
  setTimeout(()=>{
    const pills=document.querySelectorAll('.day-pill');
    if(pills[selDay]) pills[selDay].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },100);
}

function selectDay(off){
  selDay=off;
  buildWeekSections();
  buildChecklist(off);
}

// ── CHECKLIST ────────────────────────────────────────
const GROUPS=[
  {label:'Morning',    ids:['wake','cardio','weights']},
  {label:'Post-gym',   ids:['shake','coffee1','dog','work']},
  {label:'Midday',     ids:['snack','lunch','coffee2']},
  {label:'Afternoon',  ids:['snack2','dinner','supps','close','sleep']},
];

function buildChecklist(off){
  const items=makeSchedule(off),checked=loadChecked(off);
  const wrap=document.getElementById('checklistWrap');wrap.innerHTML='';
  GROUPS.forEach(g=>{
    const gi=items.filter(it=>g.ids.includes(it.id));
    if(!gi.length) return;
    const lbl=document.createElement('div');lbl.className='sec-label';lbl.textContent=g.label;
    wrap.appendChild(lbl);
    const card=document.createElement('div');card.className='card';
    gi.forEach(item=>{
      const done=checked.includes(item.id);
      const row=document.createElement('div');
      row.className='check-item'+(done?' done':'');
      row.innerHTML=`<div class="cbox"><span class="ctick">✓</span></div>
        <div style="width:8px;height:8px;border-radius:50%;background:${item.dot};flex-shrink:0;margin-top:8px"></div>
        <div class="c-content">
          <div class="c-time">${item.time}</div>
          <div class="c-label">${item.label}</div>
          <div class="c-note">${item.note}</div>
        </div>`;
      row.onclick=(()=>{const o=off,id=item.id,r=row;return()=>toggle(o,id,r);})();
      card.appendChild(row);
    });
    wrap.appendChild(card);
  });
}

function toggle(off,id,row){
  let c=loadChecked(off);
  if(c.includes(id)){c=c.filter(x=>x!==id);row.classList.remove('done')}
  else{c.push(id);row.classList.add('done')}
  saveChecked(off,c);
}
function resetDay(){
  if(!confirm('Reset checklist for this day?')) return;
  saveChecked(selDay,[]);buildChecklist(selDay);
}

// ── PROGRESS ─────────────────────────────────────────
function buildProgress(){
  const today=todayOff();
  // strip
  const strip=document.getElementById('wdayStrip');strip.innerHTML='';
  for(let i=0;i<28;i++){
    const d=new Date(START);d.setDate(d.getDate()+i);
    const lbl=['M','T','W','T','F','S','S'][i%7];
    const items=makeSchedule(i),ch=loadChecked(i);
    const pct=items.length?Math.round(ch.length/items.length*100):0;
    const hasData=ch.length>0;
    const chip=document.createElement('div');
    chip.className='wday-chip'+(hasData?' done':'');
    chip.innerHTML=`<div class="wdc-l">${lbl}</div><div class="wdc-p">${hasData?pct+'%':'—'}</div>`;
    strip.appendChild(chip);
  }
  // stats
  const ti=makeSchedule(today),tc=loadChecked(today);
  const tp=ti.length?Math.round(tc.length/ti.length*100):0;
  document.getElementById('sToday').textContent=tp+'%';
  document.getElementById('sTodaySub').textContent=tc.length+' of '+ti.length+' items';
  let da=0;for(let i=0;i<28;i++)if(loadChecked(i).length>0)da++;
  document.getElementById('sDays').textContent=da;
  let tot=0,ch=0;for(let i=0;i<28;i++){const it=makeSchedule(i);tot+=it.length;ch+=loadChecked(i).length;}
  const op=tot?Math.round(ch/tot*100):0;
  document.getElementById('overallPct').textContent=op+'%';
  document.getElementById('overallBar').style.width=op+'%';
  // week bars
  const wb=document.getElementById('weekBars');wb.innerHTML='';
  for(let w=0;w<4;w++){
    let wt=0,wc=0;
    for(let d=0;d<7;d++){const off=w*7+d,it=makeSchedule(off);wt+=it.length;wc+=loadChecked(off).length;}
    const pct=wt?Math.round(wc/wt*100):0;
    const c=WKCOLORS[w];
    wb.innerHTML+=`<div class="bar-row" style="${w>0?'margin-top:11px':''}">
      <div class="bar-top"><span style="font-size:13px">${WKSHORT[w]} · ${['Reset','Build','Maintain','Lock'][w]}</span><span style="color:var(--muted)">${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
    </div>`;
  }
  // habit bars
  const habits=[
    {label:'Kitchen closed by 8 pm',id:'close',color:'#1D9E75'},
    {label:'Post-gym shake',id:'shake',color:'#185FA5'},
    {label:'D3/K2 taken',id:'supps',color:'#D85A30'},
    {label:'Coffee after food',id:'coffee1',color:'#BA7517'},
    {label:'In bed by 9–9:30 pm',id:'sleep',color:'#534AB7'},
  ];
  const hb=document.getElementById('habitBars');hb.innerHTML='';
  habits.forEach((h,hi)=>{
    let cnt=0,pos=0;
    for(let i=0;i<28;i++){const items=makeSchedule(i);if(items.find(it=>it.id===h.id)){pos++;if(loadChecked(i).includes(h.id))cnt++;}}
    const pct=pos?Math.round(cnt/pos*100):0;
    hb.innerHTML+=`<div class="bar-row" style="${hi>0?'margin-top:11px':''}">
      <div class="bar-top"><span>${h.label}</span><span style="color:var(--muted)">${cnt}/${pos}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${h.color}"></div></div>
    </div>`;
  });
  document.getElementById('notesArea').value=localStorage.getItem('wt_notes')||'';
}

let curGymDay='mon';
function showGymDay(day,btn){
  curGymDay=day;
  document.querySelectorAll('.gtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderGym(day);
}
function gymSetKey(day,exIdx,setType,setIdx){return`wt_g_${day}_${exIdx}_${setType}_${setIdx}`}
function isSetDone(day,exIdx,setType,setIdx){return localStorage.getItem(gymSetKey(day,exIdx,setType,setIdx))==='1'}
function toggleSet(day,exIdx,setType,setIdx,el){
  const key=gymSetKey(day,exIdx,setType,setIdx);
  const done=localStorage.getItem(key)==='1';
  localStorage.setItem(key,done?'0':'1');
  el.classList.toggle('done-set',!done);
}
function renderGym(day){
  const data=GYM_DAYS[day];
  const wrap=document.getElementById('gymContent');wrap.innerHTML='';
  const info=document.createElement('div');
  info.style.cssText='font-size:13px;color:var(--muted);padding:0 2px 12px;';
  info.textContent='Focus: '+data.focus+' · 3 warm-up sets then 3 working sets per exercise';
  wrap.appendChild(info);
  data.exercises.forEach((ex,ei)=>{
    const card=document.createElement('div');card.className='ex-card';
    card.innerHTML=`<div class="ex-header">
      <div class="ex-num">${ei+1}</div>
      <div><div class="ex-name">${ex.name}</div><div class="ex-muscle">${ex.muscle}</div></div>
    </div>`;
    // warmup sets
    const wuLabel=document.createElement('div');
    wuLabel.style.cssText='font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--amber);padding:9px 15px 5px;background:#fffdf5;border-bottom:1px solid var(--border)';
    wuLabel.textContent='Warm-up sets';
    card.appendChild(wuLabel);
    ex.warmup.forEach((s,si)=>{
      const done=isSetDone(day,ei,'w',si);
      const row=document.createElement('div');
      row.className='set-row set-warmup'+(done?' done-set':'');
      row.innerHTML=`<div class="set-cbox"><span class="set-tick">✓</span></div>
        <div class="set-label">Set ${si+1}</div>
        <div class="set-detail">${s}</div>`;
      row.onclick=(()=>{const r=row,d=day,e=ei,i=si;return()=>toggleSet(d,e,'w',i,r);})();
      card.appendChild(row);
    });
    // working sets
    const wsLabel=document.createElement('div');
    wsLabel.style.cssText='font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--purple);padding:9px 15px 5px;background:#f9f9fe;border-top:1px solid var(--border);border-bottom:1px solid var(--border)';
    wsLabel.textContent='Working sets';
    card.appendChild(wsLabel);
    ex.working.forEach((s,si)=>{
      const done=isSetDone(day,ei,'s',si);
      const row=document.createElement('div');
      row.className='set-row'+(done?' done-set':'');
      row.innerHTML=`<div class="set-cbox"><span class="set-tick">✓</span></div>
        <div class="set-label">Set ${si+1}</div>
        <div class="set-detail">${s}</div>`;
      row.onclick=(()=>{const r=row,d=day,e=ei,i=si;return()=>toggleSet(d,e,'s',i,r);})();
      card.appendChild(row);
    });
    const note=document.createElement('div');note.className='gym-note';note.textContent='Form tip: '+ex.note;
    card.appendChild(note);
    wrap.appendChild(card);
  });
  // reset button
  const rb=document.createElement('button');rb.className='reset-btn';rb.textContent='Reset this session';
  rb.onclick=()=>{
    if(!confirm('Reset all sets for this day?')) return;
    data.exercises.forEach((ex,ei)=>{
      ex.warmup.forEach((_,si)=>localStorage.removeItem(gymSetKey(day,ei,'w',si)));
      ex.working.forEach((_,si)=>localStorage.removeItem(gymSetKey(day,ei,'s',si)));
    });
    renderGym(day);
  };
  wrap.appendChild(rb);
}
